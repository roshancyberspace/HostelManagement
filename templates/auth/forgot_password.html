<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password - HostelERP</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="light auth-page">
<section class="auth-shell">
    <div class="auth-card auth-card-compact">
        <div class="auth-brand">
            <div class="brand-mark">H</div>
            <div>
                <div class="brand-name">HostelERP</div>
                <div class="brand-meta">Account recovery</div>
            </div>
        </div>

        <div class="auth-copy">
            <span class="section-kicker">Forgot Password</span>
            <h1>Reset request</h1>
            <p>Please contact your hostel admin or super admin to reset your password securely.</p>
        </div>

        <a class="auth-submit auth-link-button" href="{{ url_for('auth.login') }}">Back to Login</a>
    </div>
</section>
</body>
</html>
