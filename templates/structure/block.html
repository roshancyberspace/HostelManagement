{% extends "base.html" %}
{% block content %}

<h2>Block Management</h2>

<form method="post">
    <select name="hostel_id" required>
        {% for h in hostels %}
            <option value="{{ h.id }}">{{ h.name }}</option>
        {% endfor %}
    </select>

    <input name="name" placeholder="Block Name" required>
    <button>Add Block</button>
</form>

<hr>

<table>
<tr>
    <th>Hostel</th>
    <th>Block</th>
    <th>Action</th>
</tr>

{% for b in blocks %}
<tr>
    <td>{{ b.hostel_name }}</td>
    <td>{{ b.name }}</td>
    <td>
        <form method="post"
              action="/structure/block/delete/{{ b.id }}"
              onsubmit="return confirm('Delete block?');">
            <button>🗑 Delete</button>
        </form>
    </td>
</tr>
{% else %}
<tr><td colspan="3">No blocks created</td></tr>
{% endfor %}
</table>

{% endblock %}
